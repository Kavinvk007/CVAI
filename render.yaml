services:
  - type: web
    name: cvai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && touch .env && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cvai-db
          property: connectionString

  - type: psql
    name: cvai-db
    plan: free
